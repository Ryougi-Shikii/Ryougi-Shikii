<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer X-Ray | Neural Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --accent: #ff007a;
            --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff;
            margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
            min-height: 100vh;
        }

        .hero-title {
            text-transform: uppercase; letter-spacing: 4px; font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; font-size: 2rem;
        }

        .layout { display: grid; grid-template-columns: 380px 1fr; gap: 30px; max-width: 1300px; width: 100%; }

        .panel {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 24px; padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Controls */
        label { font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        input, select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #334155;
            padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 20px; font-size: 1rem;
        }
        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(112, 0, 255, 0.4); }

        /* Trace Animation */
        .trace-log { display: flex; flex-direction: column; gap: 15px; }
        .log-entry {
            border-left: 2px solid var(--primary); padding-left: 20px;
            margin-bottom: 10px; animation: slideIn 0.5s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .step-label { font-family: 'Fira Code', monospace; color: var(--primary); font-size: 0.8rem; }
        .step-data { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-top: 5px; font-family: 'Fira Code', monospace; font-size: 0.9rem; border: 1px solid var(--border); }

        /* Attention Map Simulation */
        .attention-grid { display: grid; gap: 2px; margin-top: 10px; }
        .attn-cell { width: 20px; height: 20px; border-radius: 2px; }

        .result-display {
            margin-top: 30px; text-align: center; padding: 20px;
            background: rgba(0, 242, 255, 0.05); border-radius: 16px; border: 1px solid var(--primary);
        }
        #finalResult { font-size: 2.5rem; font-weight: 800; font-family: 'Fira Code', monospace; color: var(--primary); text-shadow: 0 0 15px var(--primary); }

    </style>
</head>
<body>

    <div class="hero-title">Neural Engine v1.0</div>

    <div class="layout">
        <div class="panel">
            <label>Neural Task</label>
            <select id="taskSelect">
                <option value="reverse">Sequence Reversal</option>
                <option value="caesar">Caesar Encryption</option>
                <option value="sort">Lexical Sorting</option>
            </select>

            <label>Input Sequence</label>
            <input type="text" id="userInput" placeholder="Enter string..." value="transformer">
            
            <button onclick="runTrace()">Initiate Inference</button>

            <div class="result-display">
                <label>Final Prediction</label>
                <div id="finalResult">----</div>
            </div>
        </div>

        <div class="panel" style="min-height: 500px;">
            <label>Execution Trace</label>
            <div id="traceLog" class="trace-log">
                <div style="color: #4b5563; font-style: italic;">Awaiting sequence initialization...</div>
            </div>
        </div>
    </div>

<script>
    const sleep = m => new Promise(r => setTimeout(r, m));

    async function runTrace() {
        const text = document.getElementById('userInput').value;
        const task = document.getElementById('taskSelect').value;
        const log = document.getElementById('traceLog');
        const res = document.getElementById('finalResult');

        if (!text) return;
        log.innerHTML = "";
        res.innerText = "....";

        // Step 1: Embedding
        await addLog("ENCODER_INPUT", `Converting characters to vector space...`);
        const tokens = text.split('').map(c => `[${c.charCodeAt(0)}]`).join(' ');
        await addLog("TOKENIZATION", tokens);
        await sleep(600);

        // Step 2: Attention
        await addLog("MULTI_HEAD_ATTENTION", `Calculating Query, Key, and Value matrices...`);
        let grid = '<div class="attention-grid" style="grid-template-columns: repeat('+text.length+', 20px)">';
        for(let i=0; i<text.length*text.length; i++) {
            let opacity = Math.random();
            grid += `<div class="attn-cell" style="background: var(--secondary); opacity: ${opacity}"></div>`;
        }
        grid += '</div>';
        await addLog("ATTENTION_MAP", grid);
        await sleep(800);

        // Step 3: API Call
        await addLog("SERVER_REQUEST", `Transmitting tensors to GPU backend...`);
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: text, task: task, method: 'beam' })
            });
            const data = await response.json();
            
            await addLog("DECODER_OUTPUT", `Generating greedy tokens...`);
            await sleep(400);
            await addLog("SOFTMAX_PROBABILITIES", `Highest confidence: ${data.output}`);
            
            res.innerText = data.output;
        } catch (e) {
            await addLog("ERROR", "Connection to Neural Backend failed.");
        }
    }

    async function addLog(label, data) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<div class="step-label">${label}</div><div class="step-data">${data}</div>`;
        document.getElementById('traceLog').appendChild(div);
    }
</script>
</body>
</html>
